<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 부리 가면을 쓴 천재 의사 - AI Project Hub</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .novel-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .novel-header { display: flex; gap: 20px; margin-bottom: 30px; align-items: flex-start; }
        .novel-cover { width: 200px; height: 300px; background-color: #333; border-radius: 8px; object-fit: cover; display: flex; align-items: center; justify-content: center; color: #888; text-align: center; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .novel-info { flex: 1; }
        .novel-title { font-size: 2rem; color: #f39c12; margin-bottom: 10px; }
        .novel-desc { line-height: 1.6; margin-bottom: 20px; color: #ccc; }
        .episode-list { list-style: none; padding: 0; display: grid; grid-template-columns: 1fr; gap: 10px; }
        @media (min-width: 600px) { .episode-list { grid-template-columns: 1fr 1fr; } }
        .episode-list li { background: rgba(255,255,255,0.05); border-radius: 5px; transition: 0.2s; border: 1px solid #333; }
        .episode-list li a { display: block; padding: 15px; color: #eee; text-decoration: none; font-weight: bold; }
        .episode-list li:hover { background: rgba(243, 156, 18, 0.1); border-color: #f39c12; transform: translateY(-2px); }
        .episode-list li a:hover { color: #f39c12; }
        .comments-section { margin-top: 50px; border-top: 2px dashed #444; padding-top: 30px; }
        .back-btn { display: inline-block; margin-bottom: 20px; color: #f39c12; text-decoration: none; font-weight: bold; }
        .back-btn:hover { text-decoration: underline; }
    </style>
</head>
<body class="dark-mode">
    <header>
        <div class="logo">AI Project Hub</div>
    </header>

    <main class="novel-container">
        <a href="index.html" class="back-btn">← 허브로 돌아가기</a>
        
        <div class="novel-header">
            <img src="cover.jpg" alt="소설 표지" class="novel-cover">
            
            <div class="novel-info">
                <h1 class="novel-title">새 부리 가면을 쓴 천재 의사</h1>
                <p class="novel-desc">
                    AI와 협업하여 집필 중인 다크 판타지 메디컬 소설.<br>
                    흑사병이 창궐하던 시대, 기괴한 새 부리 가면을 쓴 천재 의사가 보여주는 광기와 구원의 이야기.
                </p>
                <div class="tags">
                    <span style="background: #e74c3c; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; color: white;">연재중</span>
                    <span style="background: #34495e; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; color: white;">다크 판타지</span>
                    <span style="background: #34495e; padding: 3px 8px; border-radius: 4px; font-size: 0.8rem; color: white;">의학</span>
                </div>
            </div>
        </div>

        <h2>📖 에피소드 목차</h2>
        <ul class="episode-list" id="episode-container">
            <!-- 자바스크립트로 렌더링 됨 -->
        </ul>

        <!-- 댓글 시스템 (Giscus 연동) -->
        <div class="comments-section">
            <h2>💬 독자 리뷰 및 피드백</h2>
            <p style="color: #ccc; font-size: 0.9rem; margin-bottom: 20px;">
                💡 <strong>오류가 뜨나요?</strong> 깃허브 권한 설정이 필요합니다.<br>
                <a href="https://github.com/apps/giscus" target="_blank" style="color: #f39c12;">[여기]</a>를 눌러 Giscus 앱을 현재 깃허브 저장소에 <strong>설치(승인)</strong>해주셔야 독자들이 댓글을 남길 수 있습니다.
            </p>
            
            <script src="https://giscus.app/client.js"
                    data-repo="ilparacho/ai_portfolio_web"
                    data-repo-id="R_kgDOM7R-sQ"
                    data-category="Announcements"
                    data-category-id="DIC_kwDOM7R-sc4CjU_J"
                    data-mapping="pathname"
                    data-strict="0"
                    data-reactions-enabled="1"
                    data-emit-metadata="0"
                    data-input-position="bottom"
                    data-theme="transparent_dark"
                    data-lang="ko"
                    crossorigin="anonymous"
                    async>
            </script>
        </div>
    </main>

    <script src="novel_data.js"></script>
    <script>
        const container = document.getElementById('episode-container');
        // 1화~10화 등 내용이 있는 에피소드만 필터링 (내용 길이가 너무 짧으면 미등록 회차로 간주)
        const validEpisodes = novelEpisodes.filter(ep => ep.content && ep.content.length > 50);
        
        validEpisodes.forEach(ep => {
            const li = document.createElement('li');
            const a = document.createElement('a');
            a.href = `viewer.html?ep=${ep.id}`;
            a.innerText = ep.title;
            li.appendChild(a);
            container.appendChild(li);
        });
    </script>
</body>
</html>
